version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current — Dependabot bumps the pin (and its
  # version comment) and opens a PR, which the gate workflow then validates.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
